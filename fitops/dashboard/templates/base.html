<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FitOps Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/main.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 500: "#f97316", 600: "#ea580c" }
          }
        }
      }
    }
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body class="h-full text-gray-100 font-sans">

<!-- Sidebar -->
<div class="flex h-full">
  <nav class="w-56 shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">
    <div class="px-5 py-5 border-b border-gray-800">
      <span class="text-brand-500 font-bold text-lg tracking-tight">⚡ FitOps</span>
    </div>
    <ul class="flex-1 px-3 py-4 space-y-1 text-sm">
      <li>
        <a href="/"
           class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors
                  {% if active_page == 'overview' %}bg-brand-500 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Overview
        </a>
      </li>
      <li>
        <a href="/activities"
           class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors
                  {% if active_page == 'activities' %}bg-brand-500 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          Activities
        </a>
      </li>
      <li>
        <a href="/profile"
           class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors
                  {% if active_page == 'profile' %}bg-brand-500 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Profile
        </a>
      </li>
      <li class="pt-2">
        <p class="px-3 pb-1 text-xs font-semibold text-gray-600 uppercase tracking-wider">Analytics</p>
      </li>
      <li>
        <a href="/analytics/training-load"
           class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors
                  {% if active_page == 'analytics' %}bg-brand-500 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          Training Load
        </a>
      </li>
      <li>
        <a href="/analytics/trends"
           class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors
                  {% if active_page == 'trends' %}bg-brand-500 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/>
          </svg>
          Trends
        </a>
      </li>
      <li>
        <a href="/analytics/performance"
           class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors
                  {% if active_page == 'performance' %}bg-brand-500 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          Performance
        </a>
      </li>
      <li class="pt-2">
        <p class="px-3 pb-1 text-xs font-semibold text-gray-600 uppercase tracking-wider">Training</p>
      </li>
      <li>
        <a href="/workouts"
           class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors
                  {% if active_page == 'workouts' %}bg-brand-500 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
          Workouts
        </a>
      </li>
    </ul>
    <div class="px-5 py-3 border-t border-gray-800 text-xs text-gray-600">
      FitOps Dashboard
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto bg-gray-950 px-8 py-6">
    {% block content %}{% endblock %}
  </main>
</div>

<script src="/static/js/charts.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
