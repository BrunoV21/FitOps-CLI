<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FitOps{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  {% block head_extra %}{% endblock %}
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <!-- Triangle mark -->
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L13 13H1L7 1Z" fill="currentColor"/>
      </svg>
      <span class="sidebar-logo-name">FitOps</span>
      <span class="sidebar-logo-sep">/</span>
      <span class="sidebar-logo-page">{% block page_name %}—{% endblock %}</span>
    </div>

    <div class="sidebar-nav">
      <a href="/" class="sidebar-link {% if active_page == 'overview' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span>Overview</span>
      </a>
      <a href="/activities" class="sidebar-link {% if active_page == 'activities' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <span>Activities</span>
      </a>
      <a href="/profile" class="sidebar-link {% if active_page == 'profile' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span>Profile</span>
      </a>

      <div class="sidebar-section">Analytics</div>
      <a href="/analytics/training-load" class="sidebar-link {% if active_page == 'analytics' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span>Training Load</span>
      </a>
<a href="/analytics/performance" class="sidebar-link {% if active_page == 'performance' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10"/>
        </svg>
        <span>Performance</span>
      </a>

      <div class="sidebar-section">Training</div>
      <a href="/workouts" class="sidebar-link {% if active_page == 'workouts' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <span>Workouts</span>
      </a>
      <a href="/notes" class="sidebar-link {% if active_page == 'notes' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
        <span>Notes</span>
      </a>
      <a href="/weather" class="sidebar-link {% if active_page == 'weather' %}active{% endif %}">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
        </svg>
        <span>Weather</span>
      </a>
    </div>

    <!-- Sync -->
    <div class="sidebar-footer">
      <button id="sync-btn" class="sync-btn" onclick="triggerSync()">
        <svg id="sync-icon" width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <span id="sync-label">Sync</span>
      </button>
      <button id="streams-btn" class="sync-btn" onclick="triggerStreams()" title="Fetch missing streams for all activities">
        <svg id="streams-icon" width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
        </svg>
        <span id="streams-label">Streams</span>
      </button>
      <p id="sync-status" class="sync-status"></p>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="main-content">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<script src="/static/js/charts.js"></script>
{% block scripts %}{% endblock %}

<script>
// Stagger panel entrance animations
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.panel, .table-wrap, .alert, .empty-state').forEach((el, i) => {
    el.style.setProperty('--delay', `${i * 40}ms`);
  });
});

// Sync handler
async function triggerSync() {
  const btn    = document.getElementById('sync-btn');
  const icon   = document.getElementById('sync-icon');
  const label  = document.getElementById('sync-label');
  const status = document.getElementById('sync-status');

  btn.disabled = true;
  icon.classList.add('spinning');
  label.textContent = 'Syncing';
  status.textContent = '';

  try {
    const res  = await fetch('/api/sync', { method: 'POST' });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Sync failed');

    icon.classList.remove('spinning');
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>`;
    icon.style.stroke = 'var(--accent-primary)';

    const n = data.activities_created;
    label.textContent = n > 0 ? `${n} new` : 'Up to date';
    label.style.color = 'var(--accent-primary)';

    const streamsMsg = data.streams ? ` · ${data.streams.streams_fetched} streams` : '';
    status.textContent = `${data.duration_s}s${streamsMsg}`;

    setTimeout(() => location.reload(), 1800);
  } catch (err) {
    icon.classList.remove('spinning');
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>`;
    icon.style.stroke = 'var(--accent-red)';
    label.textContent = 'Error';
    label.style.color = 'var(--accent-red)';
    status.textContent = err.message;
    btn.disabled = false;
    setTimeout(() => {
      icon.style.stroke = '';
      label.style.color = '';
      label.textContent = 'Sync';
      icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>`;
      status.textContent = '';
    }, 4000);
  }
}

// Streams backfill handler
async function triggerStreams(force) {
  const btn    = document.getElementById('streams-btn');
  const icon   = document.getElementById('streams-icon');
  const label  = document.getElementById('streams-label');
  const status = document.getElementById('sync-status');

  btn.disabled = true;
  icon.classList.add('spinning');
  label.textContent = 'Fetching…';
  status.textContent = 'This may take a while (~1 req/sec)';

  const url = force ? '/api/sync/streams?force=true' : '/api/sync/streams';
  try {
    const res  = await fetch(url, { method: 'POST' });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Failed');

    icon.classList.remove('spinning');
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>`;
    icon.style.stroke = 'var(--accent-primary)';
    label.textContent = `${data.streams_fetched} done`;
    label.style.color = 'var(--accent-primary)';
    status.textContent = data.errors > 0 ? `${data.errors} errors` : '';

    setTimeout(() => location.reload(), 1800);
  } catch (err) {
    icon.classList.remove('spinning');
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>`;
    icon.style.stroke = 'var(--accent-red)';
    label.textContent = 'Error';
    label.style.color = 'var(--accent-red)';
    status.textContent = err.message;
    btn.disabled = false;
    setTimeout(() => {
      icon.style.stroke = '';
      label.style.color = '';
      label.textContent = 'Streams';
      icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>`;
      status.textContent = '';
    }, 4000);
  }
}
</script>
</body>
</html>
