<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FitOps — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-icon { font-size: 2.25rem; }
    .logo-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 0.4rem;
      color: #f1f5f9;
    }
    .logo-sub {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.25rem;
    }
    .error-box {
      background: #3b1313;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      color: #fca5a5;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    .hint {
      font-size: 0.75rem;
      color: #475569;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      padding: 0.65rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-title">FitOps Dashboard</div>
      <div class="logo-sub">Sign in to continue</div>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">

      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" autofocus required>

      <label for="totp_code">Authenticator code</label>
      <input id="totp_code" type="text" name="totp_code" inputmode="numeric"
             pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
      <p class="hint">6-digit code from your authenticator app</p>

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
